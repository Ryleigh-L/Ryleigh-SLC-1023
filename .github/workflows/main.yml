name: Deploy Website

on:
  push:
    branches:
      - master   # Action triggers when code is pushed to master

jobs:
  deploy:
    runs-on: ubuntu-latest   # Linux virtual machine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages   # Branch used by GitHub Pages
          folder: .          # Deploy root folder
